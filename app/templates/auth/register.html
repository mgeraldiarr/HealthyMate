<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HealthyMate</title>
    <meta name="view-transition" content="same-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              emerald: { 50: '#e2ede8', 100: '#cedfc9', 200: '#b9cca5', 300: '#a3b88c', 400: '#8ba472', 500: '#738f59', 600: '#0b3925', 700: '#0a2e1e', 800: '#082317', 900: '#06170f' },
              blue: { 50: '#e2ede8', 100: '#cedfc9', 200: '#b9cca5', 300: '#a3b88c', 400: '#8ba472', 500: '#738f59', 600: '#0b3925', 700: '#0a2e1e', 800: '#082317', 900: '#06170f' }
            }
          },
        },
      };
    </script>
    <style>
      ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.4s; }
    </style>
</head>
<body class="bg-[#f2f7f4] text-gray-800 font-sans flex items-center justify-center min-h-screen py-12 antialiased">
    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">Create Your Account</h1>
            <p class="text-gray-600">Join HealthyMate to start your journey</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 rounded-md {{ 'bg-red-100 text-red-700' if category == 'danger' else 'bg-green-100 text-green-700' }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="space-y-6" action="{{ url_for('app_routes.register') }}" method="POST">
            <div>
                <label for="username" class="text-sm font-medium text-gray-700">Username</label>
                <input id="username" name="username" type="text" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
                <input id="email" name="email" type="email" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                <input id="password" name="password" type="password" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <button type="submit" class="w-full py-2 px-4 font-semibold text-white bg-emerald-600 rounded-md hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition">
                    Create Account
                </button>
            </div>
        </form>
        <p class="text-sm text-center text-gray-600">
            Already have an account? <a href="{{ url_for('app_routes.login') }}" class="font-medium text-emerald-600 hover:underline">Login here</a>
        </p>
    </div>
</body>
</html>
