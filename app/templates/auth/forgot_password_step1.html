<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="{{ url_for('static', filename='images/logo-hm2.webp') }}"
      type="image/svg+xml"
    />
    <title>Forgot Password | HealthyMate</title>
    <meta name="view-transition" content="same-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              emerald: {
                600: "#0b3925",
              },
            },
          },
        },
      };
    </script>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* ===== CUSTOM FOCUS STYLES ===== */
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #cedfc9 !important;
        box-shadow: 0 0 0 2px #cedfc9 !important;
        /* Ring di dalam border, tidak menambah padding */
      }

      /* Untuk input dengan icon di dalamnya (agar ring tidak mempengaruhi icon) */
      input:focus {
        outline: none;
        border-color: #cedfc9 !important;
        box-shadow: 0 0 0 2px #cedfc9 !important;
      }

      /* Alternatif: ring dengan sedikit jarak (lebih soft) */
      /*
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #cedfc9 !important;
        box-shadow: 0 0 0 3px rgba(206, 223, 201, 0.4) !important;
      }
      */

      /* Untuk Chrome autofill */
      input:-webkit-autofill:focus {
        border-color: #cedfc9 !important;
        box-shadow: 0 0 0 2px #cedfc9 !important;
      }
    </style>
  </head>
  <body class="bg-[#f2f7f4] text-gray-800 font-sans flex items-center justify-center min-h-screen antialiased p-4 md:p-6">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-80 h-80 bg-emerald-100/20 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-emerald-100/20 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md animate-fade-in-up relative z-10">
      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 md:p-12">
          <div class="text-center mb-8">
            <a href="{{ url_for('app_routes.home') }}" class="inline-block mb-4">
              <img src="{{ url_for('static', filename='images/logo-hm2.webp') }}" alt="HealthyMate Logo" class="w-16 h-16 mx-auto"/>
            </a>
            <h1 class="text-3xl font-light text-gray-900">
              Forgot 
              <span class="italic font-serif font-normal text-gray-900">Password</span>
            </h1>
            <p class="text-gray-500 text-sm mt-2">
              Enter your email to start the recovery process.
            </p>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
              <div class="mb-6 px-3 py-2 rounded-md flex items-center gap-3 text-xs {% if category == 'danger' or category == 'error' %}bg-red-50 text-red-700 border-l-4 border-red-500{% else %}bg-[#cedfc9]/40 text-[#0b3925] border-l-4 border-[#0b3925]{% endif %}">
                <i class="fas {% if category == 'danger' or category == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                <span>{{ message }}</span>
              </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form action="{{ url_for('app_routes.forgot_password') }}" method="POST" class="space-y-5">
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
                <i class="fas fa-envelope text-[#0b3925] mr-2 text-xs"></i>
                Email Address
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <i class="fas fa-envelope text-gray-400 text-sm"></i>
                </div>
                <input
                  id="email"
                  name="email"
                  type="email"
                  required
                  class="w-full pl-10 pr-4 py-3 text-sm border border-gray-200 rounded-xl bg-gray-50/50 transition-all duration-200"
                  placeholder="you@example.com"
                />
              </div>
            </div>

            <button
              type="submit"
              class="w-full py-2.5 bg-[#0b3925] hover:bg-[#0a2f1f] text-gray-100 text-sm font-semibold rounded-xl transition-all duration-300 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg flex items-center justify-center gap-2 mt-2"
            >
              Next
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <p class="text-center text-xs text-gray-500 mt-6">
            Remember your password?
            <a href="{{ url_for('app_routes.login') }}" class="font-medium text-[#0b3925] hover:text-[#0a2f1f] hover:underline transition">
              Login here
            </a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
